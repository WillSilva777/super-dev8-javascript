<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor de Moeda</title>

    <link rel="stylesheet" href="assets/css/conversor-de-moeda.css">
</head>

<body>

    <div class="container">

        <h1>Conversor de Moeda</h1>

        <div class="form-conversor">

            <label for="campo-valor-reais">Valor em Reais</label>
            <input type="number" id="campo-valor-reais" placeholder="Digite o valor">

            <label for="campo-moeda">Escolha a moeda</label>
            <select id="campo-moeda">
                <option value="">Selecione</option>
                <option value="usd">Dólar Americano</option>
                <option value="eur">Euro</option>
                <option value="gbp">Libra Esterlina</option>
                <option value="cad">Dólar Canadense</option>
                <option value="jpy">Iene Japonês</option>
                <option value="ars">Peso Argentino</option>
                <option value="chf">Franco Suíço</option>
                <option value="cny">Yuan Chinês</option>
            </select>

            <button id="botao-converter">Converter</button>

        </div>

        <ul id="valor-convertido"></ul>

    </div>

    <script src="assets/js/conversor-de-moeda.js"></script>

</body>
</html>
