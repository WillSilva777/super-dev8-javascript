<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exercicio 1</title>
    <link rel="stylesheet" href="arquivos-css/exercicio-1.css" />
  </head>
  <body>
    <a class="botao-voltar" href="../will-exercicio.html">Voltar</a>
    <h1>Cadastro de veículos</h1>

    <div class="container">
      <label for="marca">Marca</label>
      <input type="text" id="marca-veiculo">

      <label for="modelo">Modelo</label>
      <input type="text" id="modelo-veiculo">

      <label for="ano">Ano</label>
      <input type="text" id="ano-veiculo">

      <label for="valor">Valor</label>
      <input type="text" id="valor-veiculo">

      <label for="portas">Quantidade de portas</label>
      <input type="text" id="quantidade-portas">
    </div>

    <button id="botao-salvar">Salvar</button>

    <table id="tabela-veiculos">
      <tbody id="veiculos-tabela">
        <tr>
          <td>Código</td>
          <td>Marca</td>
          <td>Modelo</td>
          <td>Ano</td>
          <td>Valor</td>
          <td>Quantidade de portas</td>
          <td>Idade veículo</td>
        </tr>
      </tbody>  
    </table>

  <script src="/exercicios/arquivo-js/exercicio-1.js"></script>
  </body>
</html>
