<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cadastro de Veículo</title>
    <link rel="stylesheet" href="/assets/css/exercicios01.css">
</head>
<body>

<div class="container">
    <h1>Cadastro de Veículo</h1>

    <div class="campo">
        <label>Modelo:</label>
        <input type="text" id="modelo">
    </div>

    <div class="campo">
        <label>Tipo de Veículo:</label>

        <label>
            <input type="radio" name="tipo" value="carro" id="radio-carro">
            Carro
        </label>

        <label>
            <input type="radio" name="tipo" value="caminhao" id="radio-caminhao">
            Caminhão
        </label>

        <label>
            <input type="radio" name="tipo" value="moto" id="radio-moto">
            Moto
        </label>

        <label>
            <input type="radio" name="tipo" value="onibus" id="radio-onibus">
            Ônibus
        </label>
    </div>

    <!-- CARRO -->
    <div id="tipo-carro" class="box-tipo">
        <h3>Dados do Carro</h3>
        <div class="campo">
            <label>Quantidade de Portas:</label>
            <input type="number" id="portas">
        </div>
        <div class="campo">
            <label>Tipo de Combustível:</label>
            <input type="text" id="combustivel">
        </div>
    </div>

    <!-- CAMINHÃO -->
    <div id="tipo-caminhao" class="box-tipo">
        <h3>Dados do Caminhão</h3>
        <div class="campo">
            <label>Capacidade de Carga (kg):</label>
            <input type="number" id="carga">
        </div>
        <div class="campo">
            <label>Quantidade de Eixos:</label>
            <input type="number" id="eixos">
        </div>
    </div>

    <!-- MOTO -->
    <div id="tipo-moto" class="box-tipo">
        <h3>Dados da Moto</h3>
        <div class="campo">
            <label>Cilindrada:</label>
            <input type="number" id="cilindrada">
        </div>
    </div>

    <!-- ÔNIBUS -->
    <div id="tipo-onibus" class="box-tipo">
        <h3>Dados do Ônibus</h3>
        <div class="campo">
            <label>Quantidade de Passageiros:</label>
            <input type="number" id="passageiros">
        </div>
    </div>

    <button id="btn-enviar">Cadastrar</button>
</div>

<script src="/assets/js/exercicios01.js"></script>
</body>
</html>
