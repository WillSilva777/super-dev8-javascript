<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h1>Consulta Para Pets</h1>

    <div>
        <label for="nome-pet">Nome Pet</label>
        <input type="text" id="nome-pet">
        <label for="data-consulta">Agendar Consulta</label>
        <input type="date" id="data-consulta">
        
    </div>

    <div>
        <label for="tipo-animal">Tipo de Animal</label>
        <select id="tipo-animal">
            <option value="capivara">Capivara</option>
            <option value="cachorro">Cachorro</option>
            <option value="gato">Gato</option>
        </select>

        <label for="idade-animal">Idade Animal</label>
        <input type="number" id="idade-animal">
    </div>

    <button id="agendar-consulta">Agendar Consulta</button>


    <script src="assets/js/seletor-id-exercicios.js"></script>
</body>

</html>
