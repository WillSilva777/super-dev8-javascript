<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="assets/css/conversor-de-moeda2.css">

    <title>Converdor de moeda</title>
</head>
<body>

    <h1>Conversor de moeda</h1>

    <div class="formm-conversor">
        <label for="campo-valor-reais">Valor em Reais</label>
            <input type="number" id="campo-valor-reais" placeholder="Digite o valor">        
    </div>

    <div class="conversao-moedas">
        <button id="btn-usd">Dólar Americano</button>                    
        <button id="btn-eur">Euro</button>                    
        <button id="btn-gbp">Libra Esterlina</button>                    
        <button id="btn-cad">Dólar Canadense</button>                    
        <button id="btn-jpy">Iene Japonês</button>                    
        <button id="btn-ars">Peso Argentino</button>                    
        <button id="btn-chf">Franco Suiço</button>                    
        <button id="btn=cny">Yuan Chinês</button>                    
    </div>
    <ul id="valor-convertido"></ul>

    <script src="assets/js/conversor-de-moeda2.js"></script>
</body>
</html>
